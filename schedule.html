<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wijhah Café — June 2026 Schedule</title>
<style>
  :root {
    --scarlet:  #70172E;
    --ink:      #000232;
    --blue:     #395479;
    --green:    #2F4842;
    --sepia:    #A38175;
    --offwhite: #F8F7F3;
    --border:   #E8E4DE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--offwhite);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── Header ── */
  .header {
    background: var(--scarlet);
    color: white;
    padding: 28px 24px 24px;
    text-align: center;
  }
  .header-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.65; margin-bottom: 6px; }
  .header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .header-sub { font-size: 14px; opacity: 0.6; }

  /* ── Name filter ── */
  .filter-section {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .filter-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sepia); margin-bottom: 10px; }
  .name-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .name-pill {
    background: var(--offwhite); border: 1.5px solid var(--border);
    color: var(--ink); border-radius: 20px; padding: 6px 14px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .name-pill:hover { border-color: var(--blue); color: var(--blue); }
  .name-pill.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 700; }
  .name-pill.all-pill.active { background: var(--scarlet); border-color: var(--scarlet); }

  /* ── Spotlight ── */
  .spotlight {
    margin: 20px 20px 0;
    background: var(--ink);
    border-radius: 16px;
    padding: 20px 22px;
    color: white;
    display: none;
  }
  .spotlight.visible { display: block; }
  .spotlight-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.45; margin-bottom: 6px; }
  .spotlight-title { font-size: 21px; font-weight: 800; margin-bottom: 3px; letter-spacing: -0.3px; }
  .spotlight-time { font-size: 13px; opacity: 0.55; margin-bottom: 14px; }
  .spotlight-role {
    display: inline-block; padding: 4px 13px; border-radius: 20px;
    font-size: 12px; font-weight: 700; margin-bottom: 12px;
  }
  .spotlight-role.lead   { background: var(--green); }
  .spotlight-role.active { background: var(--blue); }
  .spotlight-role.backup { background: rgba(255,255,255,0.15); }
  .spotlight-team { font-size: 12px; opacity: 0.5; }

  /* ── Shift cards ── */
  .shifts-wrap { padding: 20px; display: flex; flex-direction: column; gap: 12px; }

  .shift-card {
    background: white; border-radius: 14px;
    border: 1.5px solid var(--border); overflow: hidden;
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .shift-card.dimmed { opacity: 0.28; }
  .shift-card.highlighted { border-color: var(--blue); box-shadow: 0 2px 16px rgba(57,84,121,0.13); }
  .shift-card.highlighted.is-lead { border-color: var(--green); box-shadow: 0 2px 16px rgba(47,72,66,0.14); }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
  }
  .card-date-group { display: flex; align-items: baseline; gap: 10px; }
  .card-day { font-size: 12px; font-weight: 700; color: var(--sepia); text-transform: uppercase; letter-spacing: 0.5px; }
  .card-date { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; }
  .card-month { font-size: 13px; color: var(--sepia); font-weight: 500; }
  .today-badge {
    display: inline-block; background: var(--scarlet); color: white;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-left: 6px;
  }
  .card-time { font-size: 13px; font-weight: 600; color: var(--blue); text-align: right; }

  .card-body { padding: 14px 18px 16px; }
  .barista-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .barista-badge {
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 600;
  }
  .barista-badge.b-active { background: #EEF2F7; color: var(--ink); }
  .barista-badge.b-lead   { background: var(--green); color: white; }
  .barista-badge.b-self   { background: var(--blue); color: white; }
  .barista-badge.b-self.b-lead { background: var(--green); }

  .backup-row {
    font-size: 12px; color: var(--sepia);
    padding-top: 10px; border-top: 1px solid var(--border); margin-top: 12px;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--sepia); font-size: 15px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* ── Sticky calendar bar ── */
  .cal-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1.5px solid var(--border);
    padding: 14px 20px 20px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 20;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cal-bar.visible { transform: translateY(0); }
  .cal-bar-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sepia); }
  .cal-bar-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--scarlet); color: white; border: none;
    border-radius: 10px; padding: 14px 20px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s; width: 100%; font-family: inherit;
  }
  .cal-bar-btn:hover { opacity: 0.88; }
  .cal-bar-count {
    background: rgba(255,255,255,0.25); border-radius: 10px;
    padding: 2px 8px; font-size: 12px; font-weight: 700;
  }

  /* ── Footer ── */
  .footer { text-align: center; padding: 28px 24px; font-size: 12px; color: var(--sepia); border-top: 1px solid var(--border); }

  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .shifts-wrap { padding: 14px; gap: 10px; }
    .filter-section { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">☕ Wijhah Café</div>
  <h1>June 2026 Schedule</h1>
  <div class="header-sub">Wed · Fri · Sun</div>
</div>

<div class="filter-section">
  <div class="filter-label">Tap your name</div>
  <div class="name-pills" id="name-pills">
    <div class="name-pill all-pill active" onclick="setFilter(null, this)">Everyone</div>
  </div>
</div>

<div class="spotlight" id="spotlight"></div>
<div class="shifts-wrap" id="shifts-wrap"></div>
<div class="footer">Wijhah Café · June 2026</div>

<!-- Sticky calendar bar — visible when a name is selected -->
<div class="cal-bar" id="cal-bar">
  <div class="cal-bar-label" id="cal-bar-label">Your June shifts</div>
  <button class="cal-bar-btn" id="cal-bar-btn" onclick="exportAllShifts()">
    📅 Add all shifts to my calendar <span class="cal-bar-count" id="cal-bar-count"></span>
  </button>
</div>

<script>
const SCHEDULE = [
  { date:'2026-06-07', day:'Sunday',    time:'10:30 AM – 1:00 PM',  active:['Maryam Ullah','Habiba Hashi','Maryam Ahmed'],                        backup:['Mubasshira','Umar'],                           lead:'Maryam Ullah'    },
  { date:'2026-06-10', day:'Wednesday', time:'7:30 PM – 10:00 PM',  active:['Minelle Zuberi','Maryam Ullah','Maryam Ahmed'],                       backup:['Mubasshira'],                                 lead:'Minelle Zuberi'  },
  { date:'2026-06-12', day:'Friday',    time:'7:00 PM – 10:00 PM',  active:['Habiba Hashi','Umar','Abdullah S.','Taha Butta','Minelle Zuberi'],    backup:['Tooba Shaikh','Maryam Ullah','Mubasshira'],    lead:'Habiba Hashi'    },
  { date:'2026-06-14', day:'Sunday',    time:'10:30 AM – 1:00 PM',  active:['Habiba Hashi','Umar','Maryam Ullah'],                                 backup:['Mubasshira','Maryam Ahmed'],                   lead:'Habiba Hashi'    },
  { date:'2026-06-17', day:'Wednesday', time:'7:30 PM – 10:00 PM',  active:['Maryam Ahmed','Minelle Zuberi','Maryam Ullah'],                       backup:['Mubasshira'],                                 lead:'Maryam Ahmed'    },
  { date:'2026-06-19', day:'Friday',    time:'7:00 PM – 10:00 PM',  active:['Tooba Shaikh','Maryam Ullah','Minelle Zuberi','Habiba Hashi','Umar'], backup:['Taha Butta','Mubasshira','Abdullah S.'],       lead:'Tooba Shaikh'    },
  { date:'2026-06-21', day:'Sunday',    time:'10:30 AM – 1:00 PM',  active:['Mubasshira','Maryam Ahmed','Habiba Hashi'],                           backup:['Maryam Ullah','Umar'],                        lead:'Mubasshira'      },
  { date:'2026-06-24', day:'Wednesday', time:'7:30 PM – 10:00 PM',  active:['Mubasshira','Maryam Ahmed','Minelle Zuberi'],                         backup:['Maryam Ullah'],                               lead:'Mubasshira'      },
  { date:'2026-06-26', day:'Friday',    time:'7:00 PM – 10:00 PM',  active:['Abdullah S.','Taha Butta','Minelle Zuberi','Tooba Shaikh','Maryam Ullah'], backup:['Mubasshira','Habiba Hashi','Umar'],      lead:'Abdullah S.'     },
  { date:'2026-06-28', day:'Sunday',    time:'10:30 AM – 1:00 PM',  active:['Umar','Maryam Ullah','Mubasshira'],                                   backup:['Maryam Ahmed','Habiba Hashi'],                lead:'Umar'            },
];

const BARISTAS = ['Abdullah S.','Habiba Hashi','Maryam Ahmed','Maryam Ullah','Minelle Zuberi','Mubasshira','Taha Butta','Tooba Shaikh','Umar'];

let activeFilter = null;

function buildPills() {
  const c = document.getElementById('name-pills');
  BARISTAS.forEach(name => {
    const p = document.createElement('div');
    p.className = 'name-pill';
    p.textContent = name;
    p.onclick = () => setFilter(name, p);
    c.appendChild(p);
  });
}

function setFilter(name, el) {
  activeFilter = name;
  document.querySelectorAll('.name-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderShifts();
  renderSpotlight();
  updateCalBar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function myShifts() {
  if (!activeFilter) return [];
  return SCHEDULE.filter(s => s.active.includes(activeFilter) || s.backup.includes(activeFilter));
}

function updateCalBar() {
  const bar   = document.getElementById('cal-bar');
  const label = document.getElementById('cal-bar-label');
  const count = document.getElementById('cal-bar-count');
  const shifts = myShifts();
  if (!activeFilter || !shifts.length) { bar.classList.remove('visible'); return; }
  label.textContent = `${activeFilter} · ${shifts.length} shift${shifts.length !== 1 ? 's' : ''} in June`;
  count.textContent = shifts.length;
  bar.classList.add('visible');
}

function exportAllShifts() {
  const shifts = myShifts();
  if (!shifts.length) return;
  const events = shifts.map(s => {
    const [start, end] = parseShiftTime(s.date, s.time);
    const role = s.lead === activeFilter ? 'Lead' : s.active.includes(activeFilter) ? 'On shift' : 'Backup';
    const now  = new Date().toISOString().replace(/[:\-.]/g,'').slice(0,15) + 'Z';
    return ['BEGIN:VEVENT',`UID:${s.date}-${activeFilter.replace(/\s/g,'')}@wijhah.org`,`DTSTAMP:${now}`,`DTSTART:${start}`,`DTEND:${end}`,`SUMMARY:Wijhah Café – ${role}`,'LOCATION:Wijhah',`DESCRIPTION:${role} on the Wijhah Café barista team.`,'END:VEVENT'].join('\r\n');
  }).join('\r\n');
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wijhah Café//June 2026//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',events,'END:VCALENDAR'].join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar;charset=utf-8' }));
  a.download = `wijhah-cafe-june-2026-${activeFilter.toLowerCase().replace(/\s/g,'-')}.ics`;
  a.click();
}

function parseShiftTime(date, time) {
  const parts = time.replace('–','-').split('-').map(s => s.trim());
  function toISO(t, base) {
    const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!m) return null;
    let h = parseInt(m[1]), min = parseInt(m[2]);
    if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
    if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
    return `${base.replace(/-/g,'')}T${String(h).padStart(2,'0')}${String(min).padStart(2,'0')}00`;
  }
  return [toISO(parts[0], date), toISO(parts[1], date)];
}

function renderSpotlight() {
  const box = document.getElementById('spotlight');
  if (!activeFilter) { box.classList.remove('visible'); return; }
  const todayStr = dstr(new Date());
  const upcoming = SCHEDULE.filter(s => s.date >= todayStr && (s.active.includes(activeFilter) || s.backup.includes(activeFilter)));
  if (!upcoming.length) { box.classList.remove('visible'); return; }
  const next = upcoming[0];
  const isLead   = next.lead === activeFilter;
  const isActive = next.active.includes(activeFilter);
  const isToday  = next.date === todayStr;
  const role      = isLead ? 'Lead' : isActive ? 'On shift' : 'Backup';
  const roleClass = isLead ? 'lead' : isActive ? 'active' : 'backup';
  const d = new Date(next.date + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const others = next.active.filter(n => n !== activeFilter);
  box.className = 'spotlight visible';
  box.innerHTML = `<div class="spotlight-eyebrow">${isToday ? "Today's shift" : "Coming up next"}</div><div class="spotlight-title">${dateLabel}</div><div class="spotlight-time">${next.time}</div><span class="spotlight-role ${roleClass}">${role}</span><div class="spotlight-team">Also on shift: ${others.length ? others.join(', ') : '—'}</div>`;
}

function renderShifts() {
  const wrap = document.getElementById('shifts-wrap');
  const todayStr = dstr(new Date());
  const toShow = activeFilter ? SCHEDULE.filter(s => s.active.includes(activeFilter) || s.backup.includes(activeFilter)) : SCHEDULE;
  if (!toShow.length) { wrap.innerHTML = '<div class="empty"><div class="empty-icon">☕</div>No shifts this month.</div>'; return; }
  wrap.innerHTML = '';
  toShow.forEach(s => {
    const d = new Date(s.date + 'T12:00:00');
    const dayNum   = d.getDate();
    const monthStr = d.toLocaleDateString('en-US', { month: 'short' });
    const isToday      = s.date === todayStr;
    const personIsLead = activeFilter && s.lead === activeFilter;
    const card = document.createElement('div');
    card.className = 'shift-card highlighted' + (personIsLead ? ' is-lead' : '');
    let badges = '';
    s.active.forEach(name => {
      const isLead = name === s.lead;
      const isSelf = name === activeFilter;
      let cls = 'barista-badge';
      if (isSelf && isLead) cls += ' b-self b-lead';
      else if (isSelf)      cls += ' b-self';
      else if (isLead)      cls += ' b-lead';
      else                  cls += ' b-active';
      badges += `<span class="${cls}">${name}${isLead ? ' ☕' : ''}</span>`;
    });
    const backupHTML = s.backup.length ? `<div class="backup-row"><strong>Backup:</strong> ${s.backup.join(', ')}</div>` : '';
    card.innerHTML = `<div class="card-header"><div class="card-date-group"><div class="card-day">${s.day.slice(0,3)}</div><div class="card-date">${dayNum}</div><div class="card-month">${monthStr}${isToday ? '<span class="today-badge">Today</span>' : ''}</div></div><div class="card-time">${s.time}</div></div><div class="card-body"><div class="barista-row">${badges}</div>${backupHTML}</div>`;
    wrap.appendChild(card);
  });
}

function dstr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

buildPills();
renderShifts();
</script>
</body>
</html>
