<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wijhah Café Schedule</title>
<style>
:root{--scarlet:#70172E;--ink:#000232;--blue:#395479;--green:#2F4842;--sepia:#A38175;--offwhite:#F8F7F3;--border:#E8E4DE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--offwhite);color:var(--ink);min-height:100vh;padding-bottom:100px;}
.header{background:var(--scarlet);color:white;padding:24px 24px 0;text-align:center;}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.65;margin-bottom:6px;}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px;}
.month-tabs{display:flex;gap:4px;justify-content:center;padding-bottom:0;}
.month-tab{flex:1;max-width:180px;padding:8px 12px;border:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-family:inherit;transition:all .15s;}
.month-tab.active{background:var(--offwhite);color:var(--scarlet);}
.filter-section{background:white;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.filter-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sepia);margin-bottom:10px;}
.name-pills{display:flex;flex-wrap:wrap;gap:6px;}
.name-pill{background:var(--offwhite);border:1.5px solid var(--border);color:var(--ink);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;}
.name-pill:hover{border-color:var(--blue);color:var(--blue);}
.name-pill.active{background:var(--blue);border-color:var(--blue);color:white;font-weight:700;}
.name-pill.all-pill.active{background:var(--scarlet);border-color:var(--scarlet);}
.spotlight{margin:20px 20px 0;background:var(--ink);border-radius:16px;padding:20px 22px;color:white;display:none;}
.spotlight.visible{display:block;}
.spotlight-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.45;margin-bottom:6px;}
.spotlight-title{font-size:21px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px;}
.spotlight-time{font-size:13px;opacity:.55;margin-bottom:14px;}
.spotlight-role{display:inline-block;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
.spotlight-role.lead{background:var(--green);}
.spotlight-role.active{background:var(--blue);}
.spotlight-role.runner{background:var(--sepia);}
.spotlight-role.backup{background:rgba(255,255,255,.15);}
.spotlight-team{font-size:12px;opacity:.5;}
.shifts-wrap{padding:20px;display:flex;flex-direction:column;gap:12px;}
.shift-card{background:white;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
.shift-card.highlighted{border-color:var(--blue);box-shadow:0 2px 16px rgba(57,84,121,.13);}
.shift-card.highlighted.is-lead{border-color:var(--green);box-shadow:0 2px 16px rgba(47,72,66,.14);}
.shift-card.highlighted.is-runner{border-color:var(--sepia);box-shadow:0 2px 16px rgba(163,129,117,.14);}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px;border-bottom:1px solid var(--border);}
.card-date-group{display:flex;align-items:baseline;gap:10px;}
.card-day{font-size:12px;font-weight:700;color:var(--sepia);text-transform:uppercase;letter-spacing:.5px;}
.card-date{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.card-month{font-size:13px;color:var(--sepia);font-weight:500;}
.today-badge{display:inline-block;background:var(--scarlet);color:white;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-left:6px;}
.card-time{font-size:13px;font-weight:600;color:var(--blue);text-align:right;}
.card-body{padding:14px 18px 16px;}
.barista-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.barista-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;}
.b-active{background:#EEF2F7;color:var(--ink);}
.b-lead{background:var(--green);color:white;}
.b-self{background:var(--blue);color:white;}
.b-self.b-lead{background:var(--green);}
.runner-row{font-size:12px;color:var(--sepia);padding-top:8px;border-top:1px solid var(--border);margin-top:4px;display:flex;align-items:center;gap:8px;}
.runner-badge{background:rgba(163,129,117,.15);color:var(--sepia);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.runner-badge.b-self{background:var(--sepia);color:white;}
.backup-row{font-size:12px;color:var(--sepia);padding-top:8px;border-top:1px solid var(--border);margin-top:8px;}
.empty{text-align:center;padding:48px 24px;color:var(--sepia);font-size:15px;}
.cal-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--border);padding:14px 20px 20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20;display:flex;flex-direction:column;gap:6px;}
.cal-bar.visible{transform:translateY(0);}
.cal-bar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sepia);}
.cal-bar-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--scarlet);color:white;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}
.cal-bar-count{background:rgba(255,255,255,.25);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:700;}
.footer{text-align:center;padding:28px 24px;font-size:12px;color:var(--sepia);border-top:1px solid var(--border);}
@media(max-width:480px){.header h1{font-size:22px;}.shifts-wrap{padding:14px;gap:10px;}.filter-section{padding:12px 14px;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">☕ Wijhah Café</div>
  <h1>Schedule</h1>
  <div class="month-tabs"><button class="month-tab active" onclick="setMonth(0,this)">June 2026</button><button class="month-tab" onclick="setMonth(1,this)">July 2026</button></div>
</div>
<div class="filter-section">
  <div class="filter-label">Tap your name</div>
  <div class="name-pills" id="name-pills">
    <div class="name-pill all-pill active" onclick="setFilter(null,this)">Everyone</div>
  </div>
</div>
<div class="spotlight" id="spotlight"></div>
<div class="shifts-wrap" id="shifts-wrap"></div>
<div class="footer">Wijhah Café</div>
<div class="cal-bar" id="cal-bar">
  <div class="cal-bar-label" id="cal-bar-label"></div>
  <button class="cal-bar-btn" onclick="exportShifts()">
    📅 Add all my shifts to calendar <span class="cal-bar-count" id="cal-bar-count"></span>
  </button>
</div>
<script>
const MONTHS=[{"monthName":"June","year":2026,"schedule":[{"date":"2026-06-03","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-05","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-07","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-10","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-12","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-14","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-17","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-19","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-21","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-24","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-26","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-06-28","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null}]},{"monthName":"July","year":2026,"schedule":[{"date":"2026-07-01","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-03","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-05","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-08","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-10","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-12","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-15","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-17","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-19","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-22","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-24","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-26","day":"Sunday","time":"10:30 AM – 1:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-29","day":"Wednesday","time":"7:30 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null},{"date":"2026-07-31","day":"Friday","time":"7:00 PM – 10:00 PM","active":[],"backup":[],"lead":"","runner":null}]}];
const BARISTAS=[];
let mi=0,activeFilter=null;
function cur(){return MONTHS[mi].schedule;}
function setMonth(idx,el){
  mi=idx;
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderShifts();renderSpotlight();updateCalBar();
}
function buildPills(){
  const c=document.getElementById('name-pills');
  BARISTAS.forEach(name=>{const p=document.createElement('div');p.className='name-pill';p.textContent=name;p.onclick=()=>setFilter(name,p);c.appendChild(p);});
}
function setFilter(name,el){
  activeFilter=name;
  document.querySelectorAll('.name-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderShifts();renderSpotlight();updateCalBar();
  window.scrollTo({top:0,behavior:'smooth'});
}
function onShift(s,name){
  if(!name)return true;
  return s.active.includes(name)||s.backup.includes(name)||s.runner===name;
}
function myShiftsInMonth(schedule){
  if(!activeFilter)return[];
  return schedule.filter(s=>onShift(s,activeFilter));
}
function myAllShifts(){
  if(!activeFilter)return[];
  const all=[];
  MONTHS.forEach(m=>m.schedule.forEach(s=>{if(onShift(s,activeFilter))all.push(s);}));
  return all;
}
function updateCalBar(){
  const bar=document.getElementById('cal-bar'),label=document.getElementById('cal-bar-label'),count=document.getElementById('cal-bar-count');
  const all=myAllShifts();
  if(!activeFilter||!all.length){bar.classList.remove('visible');return;}
  label.textContent=activeFilter+' · '+all.length+' shift'+(all.length!==1?'s':'')+' total';
  count.textContent=all.length;bar.classList.add('visible');
}
function exportShifts(){
  const all=myAllShifts();if(!all.length)return;
  const evts=all.map(s=>{
    const[start,end]=parseTime(s.date,s.time);
    const role=s.lead===activeFilter?'Lead':s.runner===activeFilter?'Runner':s.active.includes(activeFilter)?'On shift':'Backup';
    const now=new Date().toISOString().replace(/[:-.]/g,'').slice(0,15)+'Z';
    return['BEGIN:VEVENT','UID:'+s.date+'-'+activeFilter.replace(/\s/g,'')+'@wijhah.org','DTSTAMP:'+now,'DTSTART:'+start,'DTEND:'+end,'SUMMARY:Wijhah Café – '+role,'LOCATION:Wijhah','END:VEVENT'].join('\r\n');
  }).join('\r\n');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wijhah Café//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',evts,'END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  a.download='wijhah-cafe-'+activeFilter.toLowerCase().replace(/\s/g,'-')+'.ics';
  a.click();
}
function parseTime(date,time){
  const pts=time.replace('–','-').split('-').map(s=>s.trim());
  function toISO(t,b){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return null;let h=parseInt(m[1]),min=parseInt(m[2]);if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return b.replace(/-/g,'')+'T'+String(h).padStart(2,'0')+String(min).padStart(2,'0')+'00';}
  return[toISO(pts[0],date),toISO(pts[1],date)];
}
function renderSpotlight(){
  const box=document.getElementById('spotlight');
  if(!activeFilter){box.classList.remove('visible');return;}
  const today=dstr(new Date());let next=null;
  for(const m of MONTHS){for(const s of m.schedule){if(s.date>=today&&onShift(s,activeFilter)){if(!next||s.date<next.date){next=s;break;}}}}
  if(!next){box.classList.remove('visible');return;}
  const isLead=next.lead===activeFilter,isRunner=next.runner===activeFilter,isActive=next.active.includes(activeFilter),isToday=next.date===today;
  const role=isLead?'Lead':isRunner?'Runner':isActive?'On shift':'Backup';
  const rc=isLead?'lead':isRunner?'runner':isActive?'active':'backup';
  const d=new Date(next.date+'T12:00:00');
  const lbl=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const others=next.active.filter(n=>n!==activeFilter);
  box.className='spotlight visible';
  box.innerHTML='<div class="spotlight-eyebrow">'+(isToday?"Today's shift":"Coming up next")+'</div><div class="spotlight-title">'+lbl+'</div><div class="spotlight-time">'+next.time+'</div><span class="spotlight-role '+rc+'">'+role+'</span><div class="spotlight-team">Also on shift: '+(others.length?others.join(', '):'—')+'</div>';
}
function renderShifts(){
  const wrap=document.getElementById('shifts-wrap'),today=dstr(new Date());
  const toShow=activeFilter?cur().filter(s=>onShift(s,activeFilter)):cur();
  if(!toShow.length){wrap.innerHTML='<div class="empty">☕<br>No shifts this month.</div>';return;}
  wrap.innerHTML='';
  toShow.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    const isToday=s.date===today;
    const isLead=activeFilter&&s.lead===activeFilter;
    const isRunner=activeFilter&&s.runner===activeFilter;
    const card=document.createElement('div');
    let cardCls='shift-card highlighted';
    if(isLead)cardCls+=' is-lead';
    else if(isRunner)cardCls+=' is-runner';
    card.className=cardCls;
    let badges='';
    s.active.forEach(name=>{
      const lead=name===s.lead,self=name===activeFilter;
      let cls='barista-badge';
      if(self&&lead)cls+=' b-self b-lead';
      else if(self)cls+=' b-self';
      else if(lead)cls+=' b-lead';
      else cls+=' b-active';
      badges+='<span class="'+cls+'">'+name+(lead?' ☕':'')+'</span>';
    });
    const runnerHTML=s.runner?('<div class="runner-row"><strong>Runner:</strong><span class="runner-badge'+(s.runner===activeFilter?' b-self':'')+'">'+s.runner+'</span></div>'):'';
    const bkHTML=s.backup.length?('<div class="backup-row"><strong>Backup:</strong> '+s.backup.join(', ')+'</div>'):'';
    const dayNum=d.getDate();const monthStr=d.toLocaleDateString('en-US',{month:'short'});
    card.innerHTML='<div class="card-header"><div class="card-date-group"><div class="card-day">'+s.day.slice(0,3)+'</div><div class="card-date">'+dayNum+'</div><div class="card-month">'+monthStr+(isToday?'<span class="today-badge">Today</span>':'')+'</div></div><div class="card-time">'+s.time+'</div></div><div class="card-body"><div class="barista-row">'+badges+'</div>'+runnerHTML+bkHTML+'</div>';
    wrap.appendChild(card);
  });
}
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
buildPills();renderShifts();
</script>
</body>
</html>
