<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wijhah Café Schedule</title>
<style>
:root{--scarlet:#70172E;--ink:#000232;--blue:#395479;--green:#2F4842;--sepia:#A38175;--offwhite:#F8F7F3;--border:#E8E4DE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--offwhite);color:var(--ink);min-height:100vh;padding-bottom:100px;}
.header{background:var(--scarlet);color:white;padding:24px 24px 0;text-align:center;}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.65;margin-bottom:6px;}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px;}
.month-tabs{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.month-tab{flex:1;max-width:180px;padding:8px 12px;border:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-family:inherit;transition:all .15s;}
.month-tab.active{background:var(--offwhite);color:var(--scarlet);}
.filter-section{background:white;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.filter-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sepia);margin-bottom:10px;}
.name-pills{display:flex;flex-wrap:wrap;gap:6px;}
.name-pill{background:var(--offwhite);border:1.5px solid var(--border);color:var(--ink);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;}
.name-pill:hover{border-color:var(--blue);color:var(--blue);}
.name-pill.active{background:var(--blue);border-color:var(--blue);color:white;font-weight:700;}
.name-pill.all-pill.active{background:var(--scarlet);border-color:var(--scarlet);}
.spotlight{margin:20px 20px 0;background:var(--ink);border-radius:16px;padding:20px 22px;color:white;display:none;}
.spotlight.visible{display:block;}
.spotlight-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.45;margin-bottom:6px;}
.spotlight-title{font-size:21px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px;}
.spotlight-time{font-size:13px;opacity:.55;margin-bottom:14px;}
.spotlight-role{display:inline-block;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
.spotlight-role.active{background:var(--blue);}
.spotlight-role.runner{background:var(--sepia);}
.spotlight-team{font-size:12px;opacity:.5;}
.shifts-wrap{padding:20px;display:flex;flex-direction:column;gap:12px;}
.shift-card{background:white;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
.shift-card.highlighted{border-color:var(--blue);box-shadow:0 2px 16px rgba(57,84,121,.13);}
.shift-card.highlighted.is-runner{border-color:var(--sepia);box-shadow:0 2px 16px rgba(163,129,117,.14);}
.shift-card.past{background:#f9f9f9;border-color:#e0e0e0;box-shadow:none;}
.shift-card.past .card-day,.shift-card.past .card-date,.shift-card.past .card-month,.shift-card.past .card-time{color:#bbb;}
.shift-card.past .barista-badge{background:#f0f0f0;color:#bbb;}
.shift-card.past .barista-badge.b-self{background:#ccc;color:#fff;}
.shift-card.past .backup-row,.shift-card.past .runner-row{opacity:.4;}
.shift-card.past .card-header{border-bottom-color:#eee;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px;border-bottom:1px solid var(--border);}
.card-date-group{display:flex;align-items:baseline;gap:10px;}
.card-day{font-size:12px;font-weight:700;color:var(--sepia);text-transform:uppercase;letter-spacing:.5px;}
.card-date{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.card-month{font-size:13px;color:var(--sepia);font-weight:500;}
.today-badge{display:inline-block;background:var(--scarlet);color:white;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-left:6px;}
.card-time{font-size:13px;font-weight:600;color:var(--blue);text-align:right;}
.card-body{padding:14px 18px 16px;}
.barista-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.barista-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;}
.b-active{background:#EEF2F7;color:var(--ink);}
.b-self{background:var(--blue);color:white;}
.runner-row{font-size:12px;color:var(--sepia);padding-top:8px;border-top:1px solid var(--border);margin-top:4px;display:flex;align-items:center;gap:8px;}
.runner-badge{background:rgba(163,129,117,.15);color:var(--sepia);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.runner-badge.b-self{background:var(--sepia);color:white;}
.backup-row{font-size:12px;color:var(--sepia);padding-top:8px;border-top:1px solid var(--border);margin-top:8px;}
.empty{text-align:center;padding:48px 24px;color:var(--sepia);font-size:15px;}
.cal-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid var(--border);padding:14px 20px 20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20;display:flex;flex-direction:column;gap:6px;}
.cal-bar.visible{transform:translateY(0);}
.cal-bar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sepia);}
.cal-bar-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--scarlet);color:white;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}
.cal-bar-count{background:rgba(255,255,255,.25);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:700;}
.footer{text-align:center;padding:28px 24px;font-size:12px;color:var(--sepia);border-top:1px solid var(--border);}
@media(max-width:480px){.header h1{font-size:22px;}.shifts-wrap{padding:14px;gap:10px;}.filter-section{padding:12px 14px;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">☕ Wijhah Café</div>
  <h1>Schedule</h1>
  <div class="month-tabs"><button class="month-tab active" onclick="setMonth(0,this)">June 2026</button><button class="month-tab" onclick="setMonth(1,this)">July 2026</button></div>
</div>
<div class="filter-section">
  <div class="filter-label">Tap your name</div>
  <div class="name-pills" id="name-pills">
    <div class="name-pill all-pill active" onclick="setFilter(null,this)">Everyone</div>
  </div>
</div>
<div class="spotlight" id="spotlight"></div>
<div class="shifts-wrap" id="shifts-wrap"></div>
<div class="footer">Wijhah Café</div>
<div class="cal-bar" id="cal-bar">
  <div class="cal-bar-label" id="cal-bar-label"></div>
  <button class="cal-bar-btn" onclick="exportShifts()">
    📅 Add all my shifts to calendar <span class="cal-bar-count" id="cal-bar-count"></span>
  </button>
</div>
<script>

const MONTHS=[{"monthName": "June", "year": 2026, "schedule": [{"date": "2026-06-07", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Maryam Ullah", "Habiba Hashi", "Maryam Ahmed"], "backup": ["Mubasshira"], "lead": "Maryam Ullah", "runner": "Abdullah S."}, {"date": "2026-06-10", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Minelle Zuberi", "Maryam Ullah", "Maryam Ahmed"], "backup": ["Mubasshira"], "lead": "Minelle Zuberi", "runner": "Umar"}, {"date": "2026-06-12", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Minelle Zuberi", "Tooba Shaikh"], "backup": ["Maryam Ullah", "Mubasshira"], "lead": "Habiba Hashi", "runner": "Taha Butta"}, {"date": "2026-06-14", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Habiba Hashi", "Maryam Ullah", "Mubasshira"], "backup": ["Maryam Ahmed"], "lead": "Habiba Hashi", "runner": "Abdullah S."}, {"date": "2026-06-17", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Maryam Ahmed", "Minelle Zuberi", "Maryam Ullah"], "backup": ["Mubasshira"], "lead": "Maryam Ahmed", "runner": "Umar"}, {"date": "2026-06-19", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Tooba Shaikh", "Maryam Ullah", "Minelle Zuberi"], "backup": ["Mubasshira", "Habiba Hashi"], "lead": "Tooba Shaikh", "runner": "Taha Butta"}, {"date": "2026-06-21", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Mubasshira", "Maryam Ahmed", "Habiba Hashi"], "backup": ["Maryam Ullah"], "lead": "Mubasshira", "runner": "Abdullah S."}, {"date": "2026-06-24", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Mubasshira", "Maryam Ahmed", "Minelle Zuberi"], "backup": ["Maryam Ullah"], "lead": "Mubasshira", "runner": "Umar"}, {"date": "2026-06-26", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Minelle Zuberi", "Tooba Shaikh", "Maryam Ullah"], "backup": ["Mubasshira", "Habiba Hashi"], "lead": "Minelle Zuberi", "runner": "Taha Butta"}, {"date": "2026-06-28", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Maryam Ullah", "Mubasshira", "Maryam Ahmed"], "backup": ["Habiba Hashi"], "lead": "Maryam Ullah", "runner": "Abdullah S."}]}, {"monthName": "July", "year": 2026, "schedule": [{"date": "2026-07-01", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Maryam Ullah", "Minelle Zuberi"], "backup": ["Mubasshira"], "lead": "Habiba Hashi", "runner": "Umar"}, {"date": "2026-07-03", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Maryam Ahmed", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi", "Maryam Ullah", "Minelle Zuberi"], "lead": "Maryam Ahmed", "runner": "Taha Butta"}, {"date": "2026-07-05", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Habiba Hashi", "Maryam Ullah", "Minelle Zuberi"], "backup": ["Mubasshira", "Tooba Shaikh"], "lead": "Habiba Hashi", "runner": "Abdullah S."}, {"date": "2026-07-08", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Maryam Ahmed", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi"], "lead": "Maryam Ahmed", "runner": "Umar"}, {"date": "2026-07-10", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "backup": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "lead": "Habiba Hashi", "runner": "Taha Butta"}, {"date": "2026-07-12", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi", "Maryam Ahmed"], "lead": "Minelle Zuberi", "runner": "Abdullah S."}, {"date": "2026-07-15", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "backup": ["Minelle Zuberi"], "lead": "Habiba Hashi", "runner": "Umar"}, {"date": "2026-07-17", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "lead": "Minelle Zuberi", "runner": "Taha Butta"}, {"date": "2026-07-19", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "backup": ["Minelle Zuberi", "Mubasshira"], "lead": "Habiba Hashi", "runner": "Abdullah S."}, {"date": "2026-07-22", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi"], "lead": "Minelle Zuberi", "runner": "Umar"}, {"date": "2026-07-24", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "backup": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "lead": "Habiba Hashi", "runner": "Taha Butta"}, {"date": "2026-07-26", "day": "Sunday", "time": "10:30 AM \u2013 1:00 PM", "active": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi", "Maryam Ahmed"], "lead": "Minelle Zuberi", "runner": "Abdullah S."}, {"date": "2026-07-29", "day": "Wednesday", "time": "7:30 PM \u2013 10:00 PM", "active": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "backup": ["Minelle Zuberi"], "lead": "Habiba Hashi", "runner": "Umar"}, {"date": "2026-07-31", "day": "Friday", "time": "7:00 PM \u2013 10:00 PM", "active": ["Minelle Zuberi", "Mubasshira", "Tooba Shaikh"], "backup": ["Habiba Hashi", "Maryam Ahmed", "Maryam Ullah"], "lead": "Minelle Zuberi", "runner": "Taha Butta"}]}];
const BARISTAS=["Abdullah S.", "Habiba Hashi", "Maryam Ahmed", "Maryam Ullah", "Minelle Zuberi", "Mubasshira", "Taha Butta", "Tooba Shaikh", "Umar"];
let mi=0,af=null;
function cur(){return MONTHS[mi].schedule;}
function setMonth(idx,el){mi=idx;document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();renderSpotlight();updateCalBar();}
function buildPills(){const c=document.getElementById('name-pills');BARISTAS.forEach(name=>{const p=document.createElement('div');p.className='name-pill';p.textContent=name;p.onclick=()=>setFilter(name,p);c.appendChild(p);});}
function setFilter(name,el){af=name;document.querySelectorAll('.name-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');render();renderSpotlight();updateCalBar();window.scrollTo({top:0,behavior:'smooth'});}
function onShift(s,n){if(!n)return true;return s.active.includes(n)||s.runner===n;}
function allMyShifts(){if(!af)return[];const a=[];MONTHS.forEach(m=>m.schedule.forEach(s=>{if(onShift(s,af))a.push(s);}));return a;}
function updateCalBar(){const bar=document.getElementById('cal-bar'),lbl=document.getElementById('cal-bar-label'),cnt=document.getElementById('cal-bar-count');const a=allMyShifts();if(!af||!a.length){bar.classList.remove('visible');return;}lbl.textContent=af+' · '+a.length+' shift'+(a.length!==1?'s':'') +' total';cnt.textContent=a.length;bar.classList.add('visible');}
function exportShifts(){const a=allMyShifts();if(!a.length)return;const evts=a.map(s=>{const[st,en]=pt(s.date,s.time);const role=s.runner===af?'Runner':'On shift';const now=new Date().toISOString().replace(/[:.-]/g,'').slice(0,15)+'Z';return['BEGIN:VEVENT','UID:'+s.date+'-'+af.replace(/\s/g,'')+'@wijhah.org','DTSTAMP:'+now,'DTSTART:'+st,'DTEND:'+en,'SUMMARY:Wijhah Café – '+role,'LOCATION:Wijhah','END:VEVENT'].join('\r\n');}).join('\r\n');const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wijhah Café//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',evts,'END:VCALENDAR'].join('\r\n');const a2=document.createElement('a');a2.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));a2.download='wijhah-cafe-'+af.toLowerCase().replace(/\s/g,'-')+'.ics';a2.click();}
function pt(date,time){const p=time.replace('–','-').split('-').map(s=>s.trim());function iso(t,b){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return null;let h=parseInt(m[1]),mn=parseInt(m[2]);if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return b.replace(/-/g,'')+'T'+String(h).padStart(2,'0')+String(mn).padStart(2,'0')+'00';}return[iso(p[0],date),iso(p[1],date)];}
function renderSpotlight(){const box=document.getElementById('spotlight');if(!af){box.classList.remove('visible');return;}const today=ds(new Date());let next=null;fhr(const m of MONTHS)for(const s of m.schedule)if(s.date>=today&&onShift(s,af)){if(!next||s.date<next.date){next=s;break;}}if(!next){box.classList.remove('visible');return;}const isRunner=next.runner===af,isToday=next.date===today;const role=isRunner?'Runner':'On shift';const rc=isRunner?'runner':'active';const d=new Date(next.date+'T12:00:00');const lbl=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});const others=next.active.filter(n=>n!==af);box.className='spotlight visible';box.innerHTML='<div class="spotlight-eyebrow">'+(isToday?"Today's shift":"Coming up next")+'</div><div class="spotlight-title">'+lbl+'</div><div class="spotlight-time">'+next.time+'</div><span class="spotlight-role '+rc+'">'+role+'</span><div class="spotlight-team">Also on shift: '+(others.length?others.join(', '):'—')+'</div>';}
function render(){const wrap=document.getElementById('shifts-wrap'),today=ds(new Date());const toShow=af?cur().filter(s=>onShift(s,af)):cur();if(!toShow.length){wrap.innerHTML='<div class="empty">☕<br>No shifts this month.</div>';return;}wrap.innerHTML='';toShow.forEach(s=>{const d=new Date(s.date+'T12:00:00');const isToday=s.date===today;const card=document.createElement('div');let cls='shift-card highlighted';if(af&&s.runner===af)cls+=' is-runner';if(s.date<today)cls+=' past';card.className=cls;let badges='';s.active.forEach(name=>{const self=name===af;badges+='<span class="barista-badge'+(self?' b-self':' b-active')+'">'+name+'</span>';});const rHTML=s.runner?('<div class="runner-row"><strong>Runner:</strong><span class="runner-badge'+(s.runner===af?' b-self':'')+'">🏃 '+s.runner+'</span></div>'):'';const bHTML=!af&&s.backup&&s.backup.length?('<div class="backup-row"><strong>Backup:</strong> '+s.backup.join(', ')+'</div>'):'';const dayNum=d.getDate();const mo=d.toLocaleDateString('en-US',{month:'short'});card.innerHTML='<div class="card-header"><div class="card-date-group"><div class="card-day">'+s.day.slice(0,3)+'</div><div class="card-date">'+dayNum+'</div><div class="card-month">'+mo+(isToday?'<span class="today-badge">Today</span>':'')+'</div></div><div class="card-time">'+s.time+'</div></div><div class="card-body"><div class="barista-row">'+badges+'</div>'+rHTML+bHTML+'</div>';wrap.appendChild(card);});}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
buildPills();render();

</script>
</body>
</html>
